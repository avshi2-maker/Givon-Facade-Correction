<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כתב כמויות — מתחם גבעון מבנן א׳</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --ink:#0f1923; --ink2:#2c3e50; --ink3:#64748b;
  --gold:#b8860b; --gold2:#d4a017; --gold-bg:#fdf8ee;
  --blue:#1e40af; --blue-lt:#eff6ff;
  --green:#15803d; --red:#b91c1c;
  --border:#e2d4b0; --surface:#fffdf7;
  --r:10px; --sh:0 2px 16px rgba(184,134,11,0.10);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Heebo',sans-serif;background:#f5f0e8;color:var(--ink);direction:rtl;min-height:100vh;}

/* LOADING SCREEN */
#loading-screen{
  position:fixed;inset:0;background:rgba(15,25,35,0.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;gap:16px;
}
.spin{width:44px;height:44px;border:4px solid rgba(245,200,66,0.2);border-top-color:#f5c842;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-msg{color:rgba(255,255,255,0.8);font-size:14px;font-weight:600;}
#loading-screen.hidden{display:none;}

/* ERROR SCREEN */
#error-screen{display:none;padding:40px;text-align:center;}
#error-screen.visible{display:block;}
.err-box{background:white;border-radius:var(--r);padding:32px;max-width:500px;margin:40px auto;box-shadow:var(--sh);}
.err-box h2{color:var(--red);margin-bottom:12px;}
.err-box p{color:var(--ink3);font-size:13px;line-height:1.6;}
.err-box button{margin-top:16px;padding:10px 20px;background:var(--blue);color:white;border:none;border-radius:7px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}

/* HEADER */
.hdr{background:linear-gradient(135deg,#0a1520 0%,#1a2d40 100%);color:white;padding:22px 28px 18px;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;}
.hdr-title{font-size:22px;font-weight:900;background:linear-gradient(90deg,#f5c842,#e8a020);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-sub{font-size:12px;color:rgba(255,255,255,0.55);margin-top:4px;line-height:1.6;}
.hdr-meta{text-align:left;font-size:12px;color:rgba(255,255,255,0.45);}
.hdr-meta strong{color:#f5c842;display:block;font-size:14px;}
.doc-ref{display:inline-block;margin-top:10px;background:rgba(245,200,66,0.15);border:1px solid rgba(245,200,66,0.3);color:#f5c842;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}

/* CONTRACTOR BAR */
.cbar{background:var(--gold-bg);border-bottom:2px solid var(--border);padding:14px 28px;display:flex;gap:18px;flex-wrap:wrap;align-items:flex-end;}
.cbar label{font-size:11px;font-weight:700;color:var(--gold);display:block;margin-bottom:3px;}
.cbar input{border:1.5px solid var(--border);border-radius:7px;padding:7px 11px;font-size:13px;font-family:'Heebo',sans-serif;background:white;color:var(--ink);width:200px;transition:border-color 0.2s;}
.cbar input:focus{outline:none;border-color:var(--gold);}
.cbar .f{flex-shrink:0;}

/* LIVE TOTALS BAR */
.live-bar{background:white;border-bottom:2px solid var(--border);padding:12px 28px;display:flex;gap:24px;align-items:center;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.live-item{text-align:center;}
.live-item .lv{font-size:19px;font-weight:900;}
.live-item .ll{font-size:10px;color:var(--ink3);margin-top:1px;}
.live-sep{width:1px;height:36px;background:var(--border);}
.prog-wrap{flex:1;min-width:160px;}
.prog-bg{background:#ede8db;border-radius:20px;height:7px;overflow:hidden;margin-bottom:3px;}
.prog-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,#22c55e,#16a34a);transition:width 0.4s;}
.prog-txt{font-size:11px;color:var(--ink3);}

/* MAIN */
.main{max-width:1100px;margin:0 auto;padding:20px 18px 60px;}

/* SAVED STAMP */
.stamp{display:none;background:#0f1923;color:white;border-radius:var(--r);padding:13px 18px;margin-bottom:16px;font-size:13px;}
.stamp.on{display:block;}
.stamp-id{color:#f5c842;font-weight:800;font-family:monospace;}

/* CHAPTER / SUB-CHAPTER HEADERS */
.ch-header{background:linear-gradient(135deg,#0a1520,#1a2d40);color:white;padding:11px 18px;border-radius:var(--r) var(--r) 0 0;font-size:14px;font-weight:800;display:flex;align-items:center;gap:10px;margin-top:24px;}
.ch-badge{background:var(--gold2);color:var(--ink);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:900;flex-shrink:0;}
.sub-header-row td{padding:0!important;background:transparent!important;}
.sub-header-inner{background:linear-gradient(135deg,#1e3a5f,#2d5a8e);color:#cce4ff;padding:8px 18px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px;}
.sub-badge{background:rgba(255,255,255,0.15);border-radius:4px;padding:1px 7px;font-size:10px;font-weight:800;}

/* TABLE */
.boq{width:100%;border-collapse:collapse;background:white;box-shadow:var(--sh);}
.boq th{background:#1a2d40;color:white;padding:9px 10px;font-size:11px;font-weight:700;text-align:center;white-space:nowrap;}
.boq th:nth-child(2){text-align:right;}
.boq td{padding:9px 10px;border-bottom:1px solid #f0e8d5;font-size:12px;vertical-align:top;}
.boq tr:hover td{background:#fffdf0;}
.c-num{width:110px;text-align:center;color:var(--ink3);font-size:11px;font-family:monospace;white-space:nowrap;}
.c-desc{text-align:right;line-height:1.55;color:var(--ink);}
.c-unit{width:60px;text-align:center;color:var(--ink3);font-size:11px;}
.c-qty{width:65px;text-align:center;font-weight:700;color:var(--ink2);}
.c-price{width:130px;text-align:center;}
.c-total{width:130px;text-align:center;}

.pinput{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:7px 8px;font-size:13px;font-family:'Heebo',sans-serif;text-align:center;background:#fffef8;color:var(--ink);transition:all 0.18s;}
.pinput:focus{outline:none;border-color:var(--gold);background:white;box-shadow:0 0 0 3px rgba(184,134,11,0.12);}
.pinput.ok{border-color:#22c55e;background:#f0fdf4;}
.tcell{display:inline-block;min-width:90px;padding:5px 8px;border-radius:6px;font-weight:700;font-size:12px;text-align:center;background:var(--blue-lt);color:var(--blue);}
.tcell.zero{background:#f5f5f5;color:#ccc;}

/* SUBTOTAL / CHAPTER TOTAL ROWS */
.sub-total-row td{background:linear-gradient(135deg,#e8f0fe,#dce8fd)!important;font-weight:800;font-size:12px;border-top:2px solid #a8c4f8;}
.ch-total-row td{background:linear-gradient(135deg,#0a1520,#1a2d40)!important;color:white;font-weight:800;font-size:13px;}
.ch-total-row .tcell{background:rgba(245,200,66,0.2);color:#f5c842;border:1px solid rgba(245,200,66,0.3);}

/* SUMMARY */
.summary{background:white;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-top:24px;}
.summary h3{background:linear-gradient(135deg,#0a1520,#1a2d40);color:white;padding:13px 18px;font-size:14px;font-weight:800;}
.sum-grid{padding:18px;}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f0e8d5;font-size:13px;}
.sum-row:last-child{border-bottom:none;}
.sum-row .lbl{font-weight:600;color:var(--ink2);}
.sum-row .val{font-weight:700;color:var(--ink);font-size:14px;}
.sum-total{background:linear-gradient(135deg,#0a1520,#1a2d40);margin:-1px -18px -18px;padding:15px 18px;border-radius:0 0 var(--r) var(--r);}
.sum-total .lbl{color:rgba(255,255,255,0.8);font-size:14px;font-weight:700;}
.sum-total .val{color:#f5c842;font-size:24px;font-weight:900;}

/* TERMS */
.terms-box{background:white;border-radius:var(--r);padding:16px 18px;margin-top:16px;box-shadow:var(--sh);}
.terms-box label{font-size:12px;font-weight:700;color:var(--gold);display:block;margin-bottom:6px;}
.terms-box textarea{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:10px 12px;font-family:'Heebo',sans-serif;font-size:12px;height:80px;resize:vertical;direction:rtl;color:var(--ink);}
.terms-box textarea:focus{outline:none;border-color:var(--gold);}

/* ACTIONS */
.actions{background:white;border-radius:var(--r);padding:16px 18px;margin-top:16px;box-shadow:var(--sh);display:flex;gap:10px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:7px;border:none;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.18s;touch-action:manipulation;}
.btn:hover{transform:translateY(-1px);}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;}
.b-save{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);}
.b-wa{background:linear-gradient(135deg,#15803d,#16a34a);color:white;}
.b-email{background:linear-gradient(135deg,#b91c1c,#dc2626);color:white;}
.b-print{background:linear-gradient(135deg,#374151,#4b5563);color:white;}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0f1923;color:white;padding:11px 22px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;max-width:90vw;text-align:center;}
#toast.on{opacity:1;}

/* PRINT */
@media print{
  .actions,.cbar button,.live-bar,#toast,.stamp,#loading-screen{display:none!important;}
  .hdr{background:#0a1520!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .pinput{border:1px solid #ccc!important;}
  body{background:white;}
  .main{padding:0 12px;}
}

/* MOBILE */
@media(max-width:680px){
  .hdr{padding:14px;} .hdr-title{font-size:17px;}
  .cbar{padding:12px 14px;gap:10px;} .cbar input{width:100%;} .cbar .f{width:100%;}
  .live-bar{padding:10px 14px;gap:14px;}
  .main{padding:10px 8px 60px;}
  .c-unit,.c-qty{display:none;}
  .actions{padding:12px;} .btn{font-size:12px;padding:9px 12px;}
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="spin"></div>
  <div id="loading-msg">טוען נתונים מ-Supabase...</div>
</div>

<!-- ERROR -->
<div id="error-screen">
  <div class="err-box">
    <h2>❌ שגיאת טעינה</h2>
    <p id="error-msg">לא ניתן לטעון את הנתונים מ-Supabase.</p>
    <button onclick="location.reload()">🔄 נסה שוב</button>
  </div>
</div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-title">כתב כמויות — מתחם גבעון מבנן א׳</div>
      <div class="hdr-sub">שיפוץ חיזיתות | רחוב החשמונאים 119–113<br>מגבנה 01 — עבודות במעטפת המבנים</div>
      <span class="doc-ref">מסמך 0089 | 03/10/2025</span>
    </div>
    <div class="hdr-meta">
      <strong id="offer-num-display">הצעת מחיר</strong>
      <span id="offer-date-display"></span>
    </div>
  </div>
</div>

<!-- CONTRACTOR BAR -->
<div class="cbar">
  <div class="f"><label>שם / חברה</label><input id="c-name" value="בני פרסקי — ביצוע פרויקטים"></div>
  <div class="f"><label>טלפון</label><input id="c-phone" type="tel" placeholder="05X-XXXXXXX"></div>
  <div class="f"><label>דוא״ל</label><input id="c-email" type="email" placeholder="email@..."></div>
  <div class="f"><label>תאריך הגשה</label><input id="c-date" type="date"></div>
</div>

<!-- LIVE TOTALS BAR -->
<div class="live-bar">
  <div class="prog-wrap">
    <div class="prog-bg"><div class="prog-fill" id="prog" style="width:0%"></div></div>
    <div class="prog-txt" id="prog-txt">טוען...</div>
  </div>
  <div class="live-sep"></div>
  <div class="live-item"><div class="lv" id="hdr-sub" style="color:var(--blue)">₪0</div><div class="ll">לפני מע״מ</div></div>
  <div class="live-sep"></div>
  <div class="live-item"><div class="lv" id="hdr-vat" style="color:var(--red)">₪0</div><div class="ll">מע״מ 18%</div></div>
  <div class="live-sep"></div>
  <div class="live-item"><div class="lv" id="hdr-grand" style="color:var(--ink);font-size:22px">₪0</div><div class="ll">סה״כ כולל מע״מ</div></div>
</div>

<div id="toast"></div>
<div class="stamp" id="stamp">✅ נשמר — <span class="stamp-id" id="stamp-id"></span> &nbsp;|&nbsp; <span id="stamp-ts"></span></div>

<div class="main">
  <!-- BOQ tables injected here by JS -->
  <div id="boq-container"></div>

  <!-- SUMMARY injected by JS -->
  <div id="summary-container"></div>

  <!-- TERMS -->
  <div class="terms-box">
    <label>תנאים והערות</label>
    <textarea id="terms">תוקף ההצעה: 30 יום ממועד הגשה.
תשלום: 30% מקדמה + 40% בהגעה ל-50% + 30% במסירה.
כל המחירים כוללים חומר, עבודה, ציוד ופינוי פסולת.</textarea>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <button class="btn b-save"  onclick="saveOffer()">💾 שמור הצעה</button>
    <button class="btn b-print" onclick="window.print()">📄 הדפס / PDF</button>
    <button class="btn b-wa"    onclick="shareWA()"    id="btn-wa" disabled>💬 WhatsApp</button>
    <button class="btn b-email" onclick="shareEmail()" id="btn-em" disabled>📧 Email</button>
  </div>
</div>

<script>
// ── SUPABASE ──────────────────────────────────────────────
const SB_URL = 'https://whwhokbbeluibrvmvirw.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indod2hva2JiZWx1aWJydm12aXJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MjcxNjgsImV4cCI6MjA4ODMwMzE2OH0.FwvfLeHxcTayj0yc7FWTTgifKOCHLXbfmWB4J-66cDk';
const sb = supabase.createClient(SB_URL, SB_KEY);

let allItems = [];   // loaded from boq_items
let savedId  = null;
let savedNum = null;

// ── INIT ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const today = new Date();
  document.getElementById('c-date').value = today.toISOString().split('T')[0];
  document.getElementById('offer-date-display').textContent =
    today.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'});
  await loadItems();
});

// ── LOAD ITEMS FROM SUPABASE ──────────────────────────────
async function loadItems() {
  setLoading('טוען פריטים מ-Supabase...');
  try {
    const res = await fetch(
      SB_URL + '/rest/v1/boq_items?is_active=eq.true&order=sort_order',
      { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY } }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status + ' — ' + await res.text());
    const data = await res.json();
    if (!data || data.length === 0) throw new Error('לא נמצאו פריטים בטבלת boq_items. נא להריץ את קובץ ה-SQL תחילה.');
    allItems = data;
    renderForm(data);
    hideLoading();
  } catch(e) {
    showError(e.message);
  }
}

// ── RENDER FORM FROM LOADED DATA ──────────────────────────
function renderForm(items) {
  // Group by chapter → sub_chapter
  const chapters = {};
  items.forEach(item => {
    if (!chapters[item.chapter]) {
      chapters[item.chapter] = { name: item.chapter_name, subs: {} };
    }
    if (!chapters[item.chapter].subs[item.sub_chapter]) {
      chapters[item.chapter].subs[item.sub_chapter] = { name: item.sub_chapter_name, items: [] };
    }
    chapters[item.chapter].subs[item.sub_chapter].items.push(item);
  });

  let boqHtml = '';
  let summaryRows = '';

  Object.entries(chapters).forEach(([chapNum, chap]) => {
    boqHtml += `
      <div class="ch-header">
        <span class="ch-badge">פרק ${chapNum}</span>
        ${chap.name}
      </div>
      <table class="boq">
        <thead>
          <tr>
            <th class="c-num">מספר סעיף</th>
            <th class="c-desc">תיאור</th>
            <th class="c-unit">יחידה</th>
            <th class="c-qty">כמות</th>
            <th class="c-price">מחיר (₪)</th>
            <th class="c-total">סה״כ (₪)</th>
          </tr>
        </thead>
        <tbody>`;

    Object.entries(chap.subs).forEach(([subNum, sub]) => {
      const subKey = `sub-${chapNum}-${subNum}`;

      boqHtml += `
          <tr class="sub-header-row">
            <td colspan="6">
              <div class="sub-header-inner">
                <span class="sub-badge">תת פרק ${subNum}</span>
                ${sub.name}
              </div>
            </td>
          </tr>`;

      sub.items.forEach(item => {
        boqHtml += `
          <tr data-sub="${subKey}">
            <td class="c-num">${item.item_number}</td>
            <td class="c-desc">${item.description}</td>
            <td class="c-unit">${item.unit}</td>
            <td class="c-qty">${item.qty}</td>
            <td>
              <input class="pinput"
                type="number" min="0" step="0.01" placeholder="0.00"
                data-qty="${item.qty}"
                data-item="${item.id}"
                data-item-num="${item.item_number}"
                data-sub="${subKey}">
            </td>
            <td><span class="tcell zero" id="t-${item.id}">—</span></td>
          </tr>`;
      });

      boqHtml += `
          <tr class="sub-total-row">
            <td colspan="5" style="text-align:right;padding-right:18px;">
              סה״כ תת פרק ${subNum} — ${sub.name}
            </td>
            <td><span class="tcell" id="${subKey}-total">₪0</span></td>
          </tr>`;

      summaryRows += `
        <div class="sum-row">
          <span class="lbl">תת פרק ${subNum} — ${sub.name}</span>
          <span class="val" id="s-${subKey}">₪0</span>
        </div>`;
    });

    boqHtml += `
          <tr class="ch-total-row">
            <td colspan="5" style="text-align:right;padding-right:18px;color:rgba(255,255,255,0.9);">
              סה״כ פרק ${chapNum} — ${chap.name}
            </td>
            <td><span class="tcell" id="ch-${chapNum}-total">₪0</span></td>
          </tr>
        </tbody>
      </table>`;
  });

  document.getElementById('boq-container').innerHTML = boqHtml;
  document.getElementById('summary-container').innerHTML = `
    <div class="summary">
      <h3>📊 ריכוז מחירים — מתחם גבעון מבנן א׳</h3>
      <div class="sum-grid">
        ${summaryRows}
        <div class="sum-row" style="border-top:2px solid var(--border);margin-top:4px;padding-top:12px;">
          <span class="lbl" style="font-size:14px;font-weight:800;">סה״כ לפני מע״מ</span>
          <span class="val" style="font-size:16px;" id="s-subtotal">₪0</span>
        </div>
        <div class="sum-row">
          <span class="lbl" style="color:var(--ink3);">מע״מ 18%</span>
          <span class="val" style="color:var(--red);" id="s-vat">₪0</span>
        </div>
        <div class="sum-row sum-total">
          <span class="lbl">סה״כ כולל מע״מ</span>
          <span class="val" id="s-grand">₪0</span>
        </div>
      </div>
    </div>`;

  // Attach listeners
  document.querySelectorAll('.pinput').forEach(inp => {
    inp.addEventListener('input', () => { calcRow(inp); calcAll(); });
  });

  calcAll();
}

// ── CALC ROW ──────────────────────────────────────────────
function calcRow(inp) {
  const total = (parseFloat(inp.dataset.qty)||0) * (parseFloat(inp.value)||0);
  const el = document.getElementById('t-' + inp.dataset.item);
  if (!el) return;
  if (parseFloat(inp.value) > 0) {
    el.textContent = '₪' + fmt(total);
    el.classList.remove('zero');
    inp.classList.add('ok');
  } else {
    el.textContent = '—';
    el.classList.add('zero');
    inp.classList.remove('ok');
  }
}

// ── CALC ALL ──────────────────────────────────────────────
function calcAll() {
  const subTotals = {};
  const chTotals  = {};
  let grand = 0;
  let filled = 0;
  const total = document.querySelectorAll('.pinput').length;

  document.querySelectorAll('.pinput').forEach(inp => {
    const v   = parseFloat(inp.value)||0;
    const q   = parseFloat(inp.dataset.qty)||0;
    const amt = v * q;
    const sub = inp.dataset.sub;          // e.g. sub-02-01
    const ch  = sub.split('-')[1];        // e.g. 02

    if (v > 0) filled++;
    subTotals[sub] = (subTotals[sub]||0) + amt;
    chTotals[ch]   = (chTotals[ch]||0)   + amt;
    grand += amt;
  });

  // Update sub-chapter totals
  Object.entries(subTotals).forEach(([key, val]) => {
    const el = document.getElementById(key + '-total');
    if (el) el.textContent = '₪' + fmt(val);
    const sel = document.getElementById('s-' + key);
    if (sel) sel.textContent = '₪' + fmt(val);
  });

  // Update chapter totals
  Object.entries(chTotals).forEach(([ch, val]) => {
    const el = document.getElementById('ch-' + ch + '-total');
    if (el) el.textContent = '₪' + fmt(val);
  });

  const vat   = grand * 0.18;
  const final = grand + vat;

  setEl('s-subtotal', '₪' + fmt(grand));
  setEl('s-vat',      '₪' + fmt(vat));
  setEl('s-grand',    '₪' + fmt(final));
  setEl('hdr-sub',    '₪' + fmt(grand));
  setEl('hdr-vat',    '₪' + fmt(vat));
  setEl('hdr-grand',  '₪' + fmt(final));

  const pct = total > 0 ? Math.round((filled/total)*100) : 0;
  const prog = document.getElementById('prog');
  if (prog) prog.style.width = pct + '%';
  setEl('prog-txt', filled + ' מתוך ' + total + ' סעיפים מולאו (' + pct + '%)');
}

// ── COLLECT ALL DATA ─────────────────────────────────────
function collectOffer() {
  const items = [];
  document.querySelectorAll('.pinput').forEach(inp => {
    items.push({
      item_id:     inp.dataset.item,
      item_number: inp.dataset.itemNum,
      qty:         parseFloat(inp.dataset.qty)||0,
      unit_price:  parseFloat(inp.value)||0,
      total:       (parseFloat(inp.dataset.qty)||0) * (parseFloat(inp.value)||0),
    });
  });
  const subtotal   = items.reduce((a,i) => a + i.total, 0);
  const vat_amount = subtotal * 0.18;
  return {
    header: {
      offer_date:       document.getElementById('c-date').value,
      contractor_name:  document.getElementById('c-name').value,
      contractor_phone: document.getElementById('c-phone').value,
      contractor_email: document.getElementById('c-email').value,
      project_name:     'מתחם גבעון — מבנן א׳',
      terms:            document.getElementById('terms').value,
      subtotal, vat_amount,
      grand_total: subtotal + vat_amount,
      status: 'draft',
    },
    items,
  };
}

// ── SAVE TO SUPABASE ──────────────────────────────────────
async function saveOffer() {
  const btn = document.querySelector('.b-save');
  btn.disabled = true; btn.textContent = '⏳ שומר...';
  toast('שומר ב-Supabase...');
  try {
    const { header, items } = collectOffer();

    // Generate offer number
    const { count } = await sb.from('boq_offers').select('*',{count:'exact',head:true});
    const num = 'GV-' + new Date().getFullYear() + '-' + String((count||0)+1).padStart(4,'0');
    header.offer_number = num;
    header.created_at   = new Date().toISOString();

    let offerId;
    if (savedId) {
      const { error } = await sb.from('boq_offers').update(header).eq('id', savedId);
      if (error) throw error;
      offerId = savedId;
      // Delete old line items before re-inserting
      await sb.from('boq_offer_items').delete().eq('offer_id', offerId);
    } else {
      const { data, error } = await sb.from('boq_offers').insert(header).select().single();
      if (error) throw error;
      offerId = data.id;
      savedId  = offerId;
    }

    // Insert line items
    const lineItems = items.map(i => ({ ...i, offer_id: offerId }));
    const { error: liErr } = await sb.from('boq_offer_items').insert(lineItems);
    if (liErr) throw liErr;

    savedNum = num;
    setEl('offer-num-display', num);
    setEl('stamp-id', num);
    setEl('stamp-ts', 'נשמר: ' + new Date().toLocaleString('he-IL'));
    document.getElementById('stamp').classList.add('on');
    document.getElementById('btn-wa').disabled = false;
    document.getElementById('btn-em').disabled = false;
    toast('✅ נשמר — ' + num, 'ok');
  } catch(e) {
    toast('❌ ' + e.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = '💾 שמור הצעה';
  }
}

// ── WHATSAPP ──────────────────────────────────────────────
function shareWA() {
  const { header } = collectOffer();
  const phone = document.getElementById('c-phone').value.replace(/\D/g,'');
  const msg =
    `*כתב כמויות — מתחם גבעון מבנן א׳*\n` +
    `מספר: ${savedNum||'—'} | תאריך: ${header.offer_date}\n` +
    `קבלן: ${header.contractor_name}\n\n` +
    `📊 *סיכום:*\n` +
    `לפני מע״מ: ₪${fmt(header.subtotal)}\n` +
    `מע״מ 18%: ₪${fmt(header.vat_amount)}\n` +
    `*סה״כ: ₪${fmt(header.grand_total)}*\n\n` +
    `מוגש ע״י: בני פרסקי | ביצוע פרויקטים`;
  const url = phone
    ? `https://wa.me/972${phone.replace(/^0/,'')}?text=${encodeURIComponent(msg)}`
    : `https://wa.me/?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
  if (savedId) sb.from('boq_offers').update({whatsapp_sent:true, whatsapp_sent_at:new Date().toISOString()}).eq('id', savedId);
}

// ── EMAIL ─────────────────────────────────────────────────
function shareEmail() {
  const { header } = collectOffer();
  const email = document.getElementById('c-email').value;
  const subj = encodeURIComponent(`הצעת מחיר — מתחם גבעון מבנן א׳ | ${savedNum||''}`);
  const body = encodeURIComponent(
    `שלום,\n\nלהלן הצעת המחיר עבור פרויקט מתחם גבעון מבנן א׳.\n\n` +
    `מספר: ${savedNum||'—'} | תאריך: ${header.offer_date}\n\n` +
    `לפני מע״מ: ₪${fmt(header.subtotal)}\nמע״מ 18%: ₪${fmt(header.vat_amount)}\nסה״כ: ₪${fmt(header.grand_total)}\n\n` +
    `${header.terms}\n\nבני פרסקי | ביצוע פרויקטים`
  );
  window.location.href = `mailto:${email}?subject=${subj}&body=${body}`;
  if (savedId) sb.from('boq_offers').update({email_sent:true, email_sent_at:new Date().toISOString()}).eq('id', savedId);
}

// ── HELPERS ───────────────────────────────────────────────
function fmt(n){ return Number(n||0).toLocaleString('he-IL',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function setEl(id, val){ const el=document.getElementById(id); if(el) el.textContent=val; }
function setLoading(msg){ document.getElementById('loading-msg').textContent=msg; }
function hideLoading(){ document.getElementById('loading-screen').classList.add('hidden'); }
function showError(msg){
  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('error-screen').classList.add('visible');
  document.getElementById('error-msg').textContent = msg;
}
function toast(msg, type=''){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type==='err'?'#b91c1c':type==='ok'?'#15803d':'#0f1923';
  t.classList.add('on');
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.classList.remove('on'), 3500);
}
</script>
